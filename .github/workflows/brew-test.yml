name: brew test

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

# Newer pushes supersede older runs. Without this, every Formula bump
# leaves a stale macos-13 (Intel) job queued — Intel runners are scarce
# and queue org-wide, so they'd pile up for hours otherwise.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  brew-test:
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15, macos-13, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    # brew-test should finish in well under 10 min; 30 caps a hung curl
    # or stuck install (default is 360 — too generous for this).
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - name: Set up Homebrew
        id: brew
        uses: Homebrew/actions/setup-homebrew@master
      # setup-homebrew auto-taps this repo as engine-labs/cto, symlinked to
      # the workflow checkout — so PR commits are tested by formula path.
      - name: brew style
        run: brew style engine-labs/cto/cto
      - name: brew audit
        run: brew audit --strict engine-labs/cto/cto
      - name: brew install
        run: brew install engine-labs/cto/cto
      - name: brew test
        run: brew test engine-labs/cto/cto
      - name: cto --version
        run: cto --version
